<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, user-scalable=yes">
    <title>Selfie App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            font-size: 16px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }
        #root {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background-color: white;
        }
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 1.25rem;
            text-align: center;
            padding: 0 1rem;
        }
        .video-container {
            width: 100%;
            max-width: 100%;
            background-color: #000;
            border-radius: 0.5rem;
            margin: 0 auto 1.25rem;
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
        }
        
        .video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            display: block;
        }
        
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            border: none;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 16rem;
            min-height: 3rem;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            margin: 0.5rem 0;
        }
        
        .button:active {
            transform: scale(0.98);
        }
        
        .start-button {
            background-color: #3b82f6;
            color: white;
        }
        .start-button:hover, .start-button:active {
            background-color: #2563eb;
        }
        .capture-button {
            background-color: #ef4444;
            color: white;
            animation: pulse 2s infinite;
        }
        .capture-button:active {
            background-color: #dc2626;
            animation: none;
        }
        
        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 20rem;
            margin: 0 auto;
        }
        
        .status {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            background-color: #f3f4f6;
            text-align: center;
            font-size: 0.9rem;
            color: #4b5563;
        }
        
        .success {
            background-color: #dcfce7;
            color: #166534;
        }
        
        .error {
            background-color: #fee2e2;
            color: #991b1b;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        *::-webkit-scrollbar {
            display: none;
        }
        
        /* Hide scrollbar for IE, Edge and Firefox */
        * {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { createElement: h } = React;

        function App() {
            const videoRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const [isCameraOn, setIsCameraOn] = useState(false);
            const [isRecording, setIsRecording] = useState(false);
            const [status, setStatus] = useState('');
            const [statusType, setStatusType] = useState('');
            const [recordedChunks, setRecordedChunks] = useState([]);
            const [serverUrl, setServerUrl] = useState('');

            // Get server URL
            useEffect(() => {
                const protocol = window.location.protocol;
                const hostname = window.location.hostname;
                const port = window.location.port ? `:${window.location.port}` : '';
                setServerUrl(`${protocol}//${hostname}${port}`);
            }, []);

            const startCamera = async () => {
                try {
                    // Check if we're on a mobile device
                    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
                    
                    // Try to get camera stream with different constraints
                    const constraints = {
                        video: {
                            facingMode: "user",
                            width: { ideal: isMobile ? 1280 : 1920 },
                            height: { ideal: isMobile ? 720 : 1080 },
                            frameRate: { ideal: 30, max: 60 }
                        },
                        audio: false
                    };

                    // First try with ideal constraints
                    let stream;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia(constraints);
                    } catch (error) {
                        console.log("Trying with simpler constraints...");
                        // If that fails, try with simpler constraints
                        try {
                            stream = await navigator.mediaDevices.getUserMedia({
                                video: {
                                    facingMode: { exact: "user" }
                                },
                                audio: false
                            });
                        } catch (innerError) {
                            // Last resort - try with environment facing mode
                            console.log("Trying with environment facing mode...");
                            stream = await navigator.mediaDevices.getUserMedia({
                                video: {
                                    facingMode: { exact: "environment" }
                                },
                                audio: false
                            });
                        }
                    }


                    // Set up video element
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        videoRef.current.play();
                        setIsCameraOn(true);
                        setStatus('Camera is ready!');
                        setStatusType('success');
                    }

                    // Set up media recorder for audio
                    const options = { mimeType: 'audio/webm' };
                    const mediaRecorder = new MediaRecorder(stream, options);
                    
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            setRecordedChunks(prev => [...prev, event.data]);
                        }
                    };
                    
                    mediaRecorder.onstop = async () => {
                        if (recordedChunks.length > 0) {
                            const audioBlob = new Blob(recordedChunks, { type: 'audio/webm' });
                            await uploadRecording(audioBlob);
                            setRecordedChunks([]);
                        }
                    };
                    
                    mediaRecorderRef.current = mediaRecorder;

                } catch (error) {
                    console.error('Error accessing camera:', error);
                    setStatus(`Error: ${error.message || 'Could not access camera'}`);
                    setStatusType('error');
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const tracks = videoRef.current.srcObject.getTracks();
                    tracks.forEach(track => track.stop());
                    videoRef.current.srcObject = null;
                    setIsCameraOn(false);
                }
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
                setStatus('Camera turned off');
                setStatusType('');
            };

            const toggleRecording = () => {
                if (mediaRecorderRef.current) {
                    if (isRecording) {
                        mediaRecorderRef.current.stop();
                        setStatus('Recording stopped. Uploading...');
                    } else {
                        mediaRecorderRef.current.start();
                        setStatus('Recording... Speak now!');
                        setStatusType('success');
                    }
                    setIsRecording(!isRecording);
                }
            };

            const captureImage = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    const canvas = document.createElement('canvas');
                    canvas.width = videoRef.current.videoWidth;
                    canvas.height = videoRef.current.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(videoRef.current, 0, 0, canvas.width, canvas.height);
                    
                    // Convert to blob and upload
                    canvas.toBlob(async (blob) => {
                        await uploadImage(blob);
                    }, 'image/jpeg', 0.9);
                }
            };

            const uploadImage = async (blob) => {
                try {
                    const formData = new FormData();
                    formData.append('image', blob, 'selfie.jpg');
                    
                    const response = await fetch(`${serverUrl}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        setStatus('Image uploaded successfully!');
                        setStatusType('success');
                    } else {
                        throw new Error('Upload failed');
                    }
                } catch (error) {
                    console.error('Error uploading image:', error);
                    setStatus('Error uploading image');
                    setStatusType('error');
                }
            };

            const uploadRecording = async (audioBlob) => {
                try {
                    const formData = new FormData();
                    formData.append('audio', audioBlob, 'recording.webm');
                    
                    const response = await fetch(`${serverUrl}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        setStatus('Recording uploaded successfully!');
                        setStatusType('success');
                    } else {
                        throw new Error('Upload failed');
                    }
                } catch (error) {
                    console.error('Error uploading recording:', error);
                    setStatus('Error uploading recording');
                    setStatusType('error');
                }
            };

            // Clean up on unmount
            useEffect(() => {
                return () => {
                    stopCamera();
                };
            }, []);

            return h("div", { className: "container" }, [
                h("h1", { className: "title" }, "Upload your selfie with a smile"),
                h("div", { className: "video-container" }, 
                    h("video", {
                        ref: videoRef,
                        autoPlay: true,
                        playsInline: true,
                        muted: true,
                        className: "video"
                    })
                ),
                h("div", { className: "button-container" },
                    !isCameraOn 
                        ? h("button", { 
                              className: "button start-button",
                              onClick: startCamera
                          }, "Start Camera")
                        : [
                              h("button", { 
                                  className: `button ${isRecording ? 'capture-button' : 'start-button'}`,
                                  onClick: toggleRecording
                              }, isRecording ? "Stop Recording" : "Start Recording"),
                              h("button", { 
                                  className: "button start-button",
                                  onClick: captureImage
                              }, "Take Picture"),
                              h("button", { 
                                  className: "button",
                                  style: { background: '#6b7280' },
                                  onClick: stopCamera
                              }, "Stop Camera")
                          ]
                ),
                status && h("div", { className: `status ${statusType}` }, status)
            ]);
        }

        // Initial render
        ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
</body>
</html>
